name: Bug report
description: Report a reproducible Offprint failure
title: "[bug] "
labels: [bug]
body:
  - type: textarea
    id: problem
    attributes:
      label: What happened?
      description: Do not include cookies or paid article content.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Include the command with secrets replaced by REDACTED.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Offprint version
      placeholder: offprint version
    validations:
      required: true
  - type: input
    id: system
    attributes:
      label: Operating system
    validations:
      required: true
